<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B13-A05</title>

  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- font-awesome  -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- tailwind + daisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    * {
      font-family: "Geist", sans-serif;
      font-optical-sizing: auto;
    }
  </style>
</head>

<body class="min-h-screen bg-gray-100 flex items-center justify-center">

  <div class="bg-white shadow-md rounded-xl p-8 w-96">

    <div class="text-center mb-6">
      <i class="fa-brands fa-github text-5xl mb-3"></i>
      <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
      <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
    </div>

    <label class="label">Username</label>
    <input id="username-input" type="text" class="input input-bordered w-full mb-3" placeholder="Enter Username">

    <label class="label">Password</label>
    <input id="password-input" type="password" class="input input-bordered w-full mb-4" placeholder="Enter Password">

    <button id="login-btn" class="btn btn-primary w-full">Sign In</button>

  </div>

  <script src="script.js"></script>
</body>

</html>
