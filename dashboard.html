<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B13-A05</title>

  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- font-awesome  -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- tailwind + daisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    * {
      font-family: "Geist", sans-serif;
      font-optical-sizing: auto;
    }
  </style>
</head>

<body class="bg-base-200">
  <header class="bg-base-100 border-b border-b-gray-300">
    <nav class="md:flex justify-between items-center p-1">
      <div class="text-center p-4 md:flex items-center">
        <i class="fa-brands fa-github text-5xl"></i>
        <h1 class="font-bold text-2xl">GitHub Issues Tracker</h1>
      </div>
      <div class="flex gap-3 pr-2 md:flex justify-center">
        <label class="input">
          <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input id="input-search" type="search" required placeholder="Search issues..." />
        </label>
        <button onclick="toggle('btn-search')" id="btn-search" class="btn btn-primary">+ New Issue</button>
      </div>
    </nav>
  </header>
  <main class="pt-10">
    <section class="bg-base-100 w-11/12 mx-auto p-4 shadow-sm rounded-md flex justify-center gap-3 md:justify-start">
      <button onclick="toggle('All-filter-btn')" id="All-filter-btn" class="btn btn-primary w-20">All</button>
      <button onclick="toggle('Open-filter-btn')" id="Open-filter-btn" class="btn btn-soft w-20">Open</button>
      <button onclick="toggle('Closed-filter-btn')" id="Closed-filter-btn" class="btn btn-soft w-20">Closed</button>
    </section>
    <section
      class="bg-base-100 w-11/12 mx-auto p-4 shadow-sm rounded-t-md border-b border-b-gray-200 mt-4 px-4 gap-8 flex flex-col items-center md:flex-row justify-between">
      <div class="flex items-center gap-1">
        <span class="rounded-full p-2 bg-purple-200">
          <img src="assets/Aperture.png" alt="" class="w-8 h-8">
        </span>
        <div>
          <h1 class="text-xl font-bold"><span id="num">50</span> Issues</h1>
          <p class="text-gray-500">Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex gap-4 items-center">
        <div class="flex gap-1 items-center">
          <img src="assets/Ellipse 2.png" alt="" class="w-3 h-3">
          <p class="font-semibold">Open</p>
        </div>
        <div class="flex gap-1 items-center">
          <img src="assets/Ellipse 2 (1).png" alt="" class="w-3 h-3">
          <p class="font-semibold">Closed</p>
        </div>
      </div>
    </section>
    <div id="spinner" class="hidden flex justify-center items-center py-10">
      <span class="loading loading-infinity loading-lg text-primary"></span>
    </div>
    <section id="All-section"
      class="bg-base-100 w-11/12 mx-auto p-4 shadow-sm rounded-b-md gap-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4">
    </section>
    <section id="Open-section"
      class="hidden bg-base-100 w-11/12 mx-auto p-4 shadow-sm rounded-b-md gap-4 grid grid-cols-1 md:grid-cols-4">
    </section>
    <section id="Closed-section"
      class="hidden bg-base-100 w-11/12 mx-auto p-4 shadow-sm rounded-b-md gap-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4">
    </section>
  </main>
  <script src="script/script.js"></script>
</body>

</html>
